<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XtermChat · Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="/_layout.js"></script>
<style>
  body{font-family:'DM Sans',sans-serif}
  .mono{font-family:'JetBrains Mono',monospace}
  .card{background:#fff;border:1px solid #f1f5f9;border-radius:14px;padding:20px;transition:all .2s}
  .card:hover{border-color:#e2e8f0;box-shadow:0 4px 16px rgba(0,0,0,.05)}
  .stat{background:#fff;border:1px solid #f1f5f9;border-radius:14px;padding:18px 20px}
  .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
  #sidebar{transform:translateX(-100%)}
  @media(min-width:1024px){#sidebar{transform:translateX(0)}}
</style>
</head>
<body class="bg-slate-50 min-h-screen">

<!-- Sidebar -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-60 bg-white border-r border-slate-100 z-40 flex flex-col transition-transform duration-300">
  <div class="flex items-center gap-3 px-5 py-5 border-b border-slate-100">
    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shrink-0">
      <span class="text-white font-black text-xs mono">xtc</span>
    </div>
    <div class="flex-1">
      <div class="text-sm font-bold text-slate-900">XtermChat</div>
      <div class="text-[10px] text-slate-400 mono">Admin Panel</div>
    </div>
    <button onclick="closeSidebar()" class="lg:hidden text-slate-400 hover:text-slate-700 p-1 text-lg">✕</button>
  </div>
  <nav class="flex-1 px-3 py-4 space-y-1">
    <div class="px-1 mb-3 text-[9px] font-bold uppercase tracking-widest text-slate-300 mono">Navigation</div>
    <a href="/dashboard" class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold bg-blue-50 text-blue-600">
      <span class="w-5 text-center">◈</span><span>Dashboard</span>
      <span class="ml-auto w-1.5 h-1.5 rounded-full bg-blue-600"></span>
    </a>
    <a href="/rooms" class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-50 hover:text-slate-800 transition-colors">
      <span class="w-5 text-center">⊞</span><span>Rooms</span>
    </a>
    <a href="/chat" class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-50 hover:text-slate-800 transition-colors">
      <span class="w-5 text-center">◎</span><span>Chat</span>
    </a>
    <a href="/bots" class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-50 hover:text-slate-800 transition-colors">
      <span class="w-5 text-center">⊕</span><span>Bots</span>
    </a>
  </nav>
  <div class="px-4 py-4 border-t border-slate-100">
    <div class="flex items-center gap-3 mb-3">
      <div id="sb-avatar" class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold shrink-0">--</div>
      <div class="min-w-0">
        <div id="sb-user" class="text-sm font-bold text-slate-800 truncate">—</div>
        <div id="sb-ip" class="text-[10px] text-slate-400 truncate mono">—</div>
      </div>
    </div>
    <button onclick="logout()" class="text-xs font-semibold text-slate-400 hover:text-red-500 transition-colors">← Disconnect</button>
  </div>
</aside>
<div id="overlay" onclick="closeSidebar()" style="display:none" class="fixed inset-0 bg-black/40 z-30 lg:hidden backdrop-blur-sm"></div>

<!-- Main -->
<div class="lg:pl-60 min-h-screen">
  <!-- Topbar -->
  <header class="sticky top-0 z-20 bg-white border-b border-slate-100 px-5 lg:px-8 h-14 flex items-center gap-4">
    <button onclick="openSidebar()" class="lg:hidden text-slate-500 hover:text-slate-800 p-1">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <h1 class="text-base font-bold text-slate-800">Dashboard</h1>
    <div class="ml-auto flex items-center gap-2">
      <span id="connDot" class="w-2 h-2 rounded-full bg-slate-300"></span>
      <span id="connLabel" class="text-xs text-slate-400 mono hidden sm:block">checking...</span>
    </div>
  </header>

  <!-- Content -->
  <main class="p-5 lg:p-8 max-w-5xl mx-auto">
    <!-- Greeting -->
    <div class="mb-7">
      <h2 class="text-xl font-bold text-slate-900 mb-1">Welcome back, <span id="greetUser">—</span> 👋</h2>
      <p class="text-sm text-slate-400 mono" id="greetServer">—</p>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-7">
      <div class="stat">
        <div class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mono mb-2">Status</div>
        <div class="flex items-center gap-2">
          <div id="statusDot" class="w-2.5 h-2.5 rounded-full bg-slate-300"></div>
          <div id="statusText" class="text-lg font-bold text-slate-800">—</div>
        </div>
      </div>
      <div class="stat">
        <div class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mono mb-2">Rooms</div>
        <div id="statRooms" class="text-3xl font-bold text-slate-800">—</div>
      </div>
      <div class="stat">
        <div class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mono mb-2">Active Bots</div>
        <div id="statBots" class="text-3xl font-bold text-slate-800">—</div>
      </div>
      <div class="stat">
        <div class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mono mb-2">Server</div>
        <div id="statIp" class="text-sm font-bold text-slate-800 mono truncate">—</div>
        <div id="statPort" class="text-xs text-slate-400 mono">—</div>
      </div>
    </div>

    <!-- Quick actions -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-7">
      <a href="/rooms" class="card flex flex-col items-center gap-2 py-5 hover:border-blue-200 hover:bg-blue-50/40 text-center no-underline">
        <span class="text-2xl">⊞</span>
        <span class="text-sm font-semibold text-slate-700">Rooms</span>
        <span class="text-xs text-slate-400">Manage rooms</span>
      </a>
      <a href="/chat" class="card flex flex-col items-center gap-2 py-5 hover:border-blue-200 hover:bg-blue-50/40 text-center no-underline">
        <span class="text-2xl">◎</span>
        <span class="text-sm font-semibold text-slate-700">Chat</span>
        <span class="text-xs text-slate-400">Open chat</span>
      </a>
      <a href="/bots" class="card flex flex-col items-center gap-2 py-5 hover:border-blue-200 hover:bg-blue-50/40 text-center no-underline">
        <span class="text-2xl">🤖</span>
        <span class="text-sm font-semibold text-slate-700">Bots</span>
        <span class="text-xs text-slate-400">Monitor bots</span>
      </a>
      <button onclick="logout()" class="card flex flex-col items-center gap-2 py-5 hover:border-red-200 hover:bg-red-50/40 text-center cursor-pointer w-full">
        <span class="text-2xl">←</span>
        <span class="text-sm font-semibold text-slate-700">Disconnect</span>
        <span class="text-xs text-slate-400">Sign out</span>
      </button>
    </div>

    <!-- Rooms + Bots -->
    <div class="grid lg:grid-cols-2 gap-5">
      <div class="card">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-sm font-bold text-slate-800">Recent Rooms</h3>
          <a href="/rooms" class="text-xs text-blue-500 font-semibold hover:underline">View all →</a>
        </div>
        <div id="roomsList"><div class="text-xs text-slate-300 text-center py-6 mono">Loading...</div></div>
      </div>
      <div class="card">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-sm font-bold text-slate-800">Registered Bots</h3>
          <a href="/bots" class="text-xs text-blue-500 font-semibold hover:underline">View all →</a>
        </div>
        <div id="botsList"><div class="text-xs text-slate-300 text-center py-6 mono">Loading...</div></div>
      </div>
    </div>
  </main>
</div>

<script>
(async () => {
  const s = requireSession();
  if (!s) return;

  // Fill greeting + server info
  document.getElementById('greetUser').textContent  = s.user;
  document.getElementById('greetServer').textContent = `${s.ip}:${s.port}`;
  document.getElementById('statIp').textContent      = s.ip;
  document.getElementById('statPort').textContent    = `:${s.port}`;

  // Fetch all data in parallel
  let rooms = [], bots = [], online = false, version = '—';
  try {
    const [rServer, rRooms, rBots] = await Promise.all([
      GET('/'),
      GET('/rooms'),
      GET('/bot/list/all'),
    ]);
    online  = rServer.ok && rServer.data?.status === 'online';
    version = rServer.data?.version || '—';
    rooms   = rRooms.data?.rooms  || [];
    bots    = rBots.data?.bots    || [];
  } catch(e) { online = false; }

  // Update status
  const dot   = document.getElementById('connDot');
  const label = document.getElementById('connLabel');
  dot.className = `w-2 h-2 rounded-full ${online ? 'bg-green-400' : 'bg-red-400'}`;
  label.textContent = online ? 'online' : 'offline';

  document.getElementById('statusDot').className  = `w-2.5 h-2.5 rounded-full ${online ? 'bg-green-400' : 'bg-red-400'}`;
  document.getElementById('statusText').textContent = online ? 'Online' : 'Offline';

  // Stats
  const activeBots = bots.filter(b => b.status === 'active').length;
  document.getElementById('statRooms').textContent = rooms.length;
  document.getElementById('statBots').innerHTML    = `${activeBots} <span class="text-lg text-slate-300">/ ${bots.length}</span>`;

  // Rooms list
  document.getElementById('roomsList').innerHTML = rooms.length === 0
    ? '<div class="text-xs text-slate-400 text-center py-4">No rooms yet</div>'
    : rooms.slice(0, 5).map(r => `
      <div class="flex items-center gap-3 py-2.5 border-b border-slate-50 last:border-0">
        <div class="w-7 h-7 rounded-lg bg-blue-50 flex items-center justify-center text-blue-600 text-xs font-bold mono shrink-0">#</div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-semibold text-slate-800 truncate mono">@${r.name}</div>
          <div class="text-xs text-slate-400 truncate">${r.description || 'No description'}</div>
        </div>
        ${r.has_password
          ? '<span class="badge bg-amber-50 text-amber-600">🔒</span>'
          : '<span class="badge bg-green-50 text-green-600">●</span>'}
      </div>`).join('');

  // Bots list
  document.getElementById('botsList').innerHTML = bots.length === 0
    ? '<div class="text-xs text-slate-400 text-center py-4">No bots registered</div>'
    : bots.slice(0, 5).map(b => {
        const tasks = (typeof b.tasks === 'string' ? JSON.parse(b.tasks||'[]') : b.tasks||[]);
        const tNames = tasks.map(t => t.id).join(', ') || '—';
        const active = b.status === 'active';
        return `
        <div class="flex items-center gap-3 py-2.5 border-b border-slate-50 last:border-0">
          <div class="w-7 h-7 rounded-lg ${active?'bg-green-50':'bg-slate-100'} flex items-center justify-center text-base shrink-0">🤖</div>
          <div class="flex-1 min-w-0">
            <div class="text-sm font-semibold text-slate-800 truncate mono">${b.name}</div>
            <div class="text-xs text-slate-400 truncate">${tNames}</div>
          </div>
          <span class="badge ${active?'bg-green-50 text-green-600':'bg-slate-100 text-slate-400'}">
            ${active ? '● Active' : '○ Off'}
          </span>
        </div>`;
      }).join('');
})();
</script>
</body>
</html>
