<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XtermChat | Authorize</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        @keyframes slideUp {
            from { transform: translate(-50%, 100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        .toast-active { animation: slideUp 0.3s ease forwards; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .glass-effect { background: rgba(255, 255, 255, 0.8); backdrop-blur: 10px; }
        .input-soft { @apply bg-gray-100 border-0 rounded-2xl px-5 py-4 text-sm font-semibold text-gray-900 focus:ring-2 focus:ring-blue-500/20 transition-all outline-none; }
    </style>
</head>
<body class="bg-white h-screen flex flex-col md:flex-row overflow-hidden transition-opacity duration-500">

    <div id="toast" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] min-w-[300px] bg-gray-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-4">
        <div id="toast-icon" class="text-lg">⚠️</div>
        <div class="flex flex-col">
            <p id="toast-msg" class="text-xs font-bold leading-tight"></p>
        </div>
    </div>

    <div class="hidden md:flex flex-1 bg-gradient-to-br from-blue-600 to-blue-700 p-20 flex-col justify-between text-white relative">
        <div class="relative z-10">
            <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center mb-16 shadow-lg">
                <span class="text-blue-600 text-xl font-black italic tracking-tighter">xtc</span>
            </div>
            <h2 class="text-6xl font-black leading-[0.9] mb-8 uppercase tracking-tighter">UNIFIED<br>MESSAGING<br>GATEWAY.</h2>
            <p class="text-blue-100 text-sm leading-relaxed max-w-[320px] font-medium opacity-80 italic">
                Real-time synchronization between CLI, Web Interfaces, and Mobile Access.
            </p>
        </div>
        <div class="relative z-10 flex gap-10">
            <div class="flex flex-col gap-1">
                <span class="text-[10px] font-bold uppercase tracking-widest text-blue-200 opacity-60">Security</span>
                <span class="text-xs font-bold uppercase">Encrypted</span>
            </div>
            <div class="flex flex-col gap-1">
                <span class="text-[10px] font-bold uppercase tracking-widest text-blue-200 opacity-60">Network</span>
                <span class="text-xs font-bold uppercase">Multi-Sync</span>
            </div>
        </div>
    </div>

    <div class="flex-1 flex flex-col justify-center p-8 md:p-24 bg-white">
        <div class="max-w-[400px] w-full mx-auto">
            <div class="mb-10">
                <h1 class="text-3xl font-black tracking-tight text-gray-900 mb-2">xtc | authorize</h1>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em]">Identity Verification Required</p>
            </div>

            <div class="space-y-5">
                <div class="flex gap-3">
                    <div class="flex-[2]">
                        <label class="block text-[10px] font-bold uppercase text-gray-400 mb-2 ml-1 tracking-widest">Server IP</label>
                        <input type="text" id="ip" placeholder="127.0.0.1" 
                            class="w-full bg-gray-100 border-0 rounded-2xl px-5 py-4 text-sm font-semibold text-gray-900 focus:ring-2 focus:ring-blue-500/20 transition-all outline-none">
                    </div>
                    <div class="flex-1">
                        <label class="block text-[10px] font-bold uppercase text-gray-400 mb-2 ml-1 tracking-widest">Port</label>
                        <input type="text" id="port" placeholder="8080" 
                            class="w-full bg-gray-100 border-0 rounded-2xl px-5 py-4 text-sm font-semibold text-gray-900 text-center focus:ring-2 focus:ring-blue-500/20 transition-all outline-none">
                    </div>
                </div>
                
                <div>
                    <label class="block text-[10px] font-bold uppercase text-gray-400 mb-2 ml-1 tracking-widest">User Handle</label>
                    <input type="text" id="user" placeholder="USERNAME" 
                        class="w-full bg-gray-100 border-0 rounded-2xl px-5 py-4 text-sm font-bold uppercase text-gray-900 focus:ring-2 focus:ring-blue-500/20 transition-all outline-none" autocomplete="off">
                </div>

                <div>
                    <label class="block text-[10px] font-bold uppercase text-gray-400 mb-2 ml-1 tracking-widest">Security PIN (5-Digits)</label>
                    <div class="flex justify-between gap-2" id="pin-container">
                        <input type="password" maxlength="1" class="pin-box w-full h-14 bg-gray-100 border-0 rounded-xl text-center text-xl font-black focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
                        <input type="password" maxlength="1" class="pin-box w-full h-14 bg-gray-100 border-0 rounded-xl text-center text-xl font-black focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
                        <input type="password" maxlength="1" class="pin-box w-full h-14 bg-gray-100 border-0 rounded-xl text-center text-xl font-black focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
                        <input type="password" maxlength="1" class="pin-box w-full h-14 bg-gray-100 border-0 rounded-xl text-center text-xl font-black focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
                        <input type="password" maxlength="1" class="pin-box w-full h-14 bg-gray-100 border-0 rounded-xl text-center text-xl font-black focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
                    </div>
                </div>

                <div class="flex items-center gap-3 py-2">
                    <input type="checkbox" id="remember" checked class="w-4 h-4 rounded-md border-gray-300 text-blue-600 focus:ring-0 cursor-pointer">
                    <label for="remember" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest cursor-pointer select-none">Remember Config</label>
                </div>
                
                <button id="connectBtn" onclick="connect()" 
                    class="w-full bg-gray-900 text-white font-bold py-5 rounded-2xl hover:bg-blue-600 shadow-lg shadow-gray-200 hover:shadow-blue-500/30 transition-all active:scale-[0.98] text-[11px] uppercase tracking-widest">
                    Connect to Server
                </button>

                <p class="pt-6 text-[12px] text-gray-300 text-center font-bold">
                    Have anny issues? Join our <a href="#" target="_blank" class="text-blue-600 hover:underline">xtc support.</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        const pinBoxes = document.querySelectorAll('.pin-box');

        pinBoxes.forEach((box, index) => {
            box.addEventListener('input', () => {
                if (box.value.length === 1 && index < pinBoxes.length - 1) {
                    pinBoxes[index + 1].focus();
                }
            });
            box.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && box.value.length === 0 && index > 0) {
                    pinBoxes[index - 1].focus();
                }
            });
        });

        window.onload = () => {
            const savedIp = localStorage.getItem('xtc_remember_ip');
            const savedPort = localStorage.getItem('xtc_remember_port');
            if (savedIp) document.getElementById('ip').value = savedIp;
            if (savedPort) document.getElementById('port').value = savedPort;
            document.getElementById('user').focus();
        };

        function notify(message, icon = "⚠️") {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = message;
            document.getElementById('toast-icon').innerText = icon;
            toast.classList.remove('hidden');
            toast.classList.add('toast-active');
            setTimeout(() => {
                toast.classList.add('hidden');
                toast.classList.remove('toast-active');
            }, 3000);
        }

        async function connect() {
            const btn = document.getElementById('connectBtn');
            const ip = document.getElementById('ip').value.trim();
            const port = document.getElementById('port').value.trim() || '8080';
            const user = document.getElementById('user').value.trim();
            let pin = "";
            pinBoxes.forEach(box => pin += box.value);
            const remember = document.getElementById('remember').checked;

            if (!ip || !user || pin.length < 5) {
                notify(pin.length < 5 ? "Complete 5-Digit PIN" : "Missing Credentials");
                return;
            }

            btn.innerText = "VERIFYING IDENTITY...";
            btn.disabled = true;

            try {
                const res = await fetch(`http://${ip}:${port}/login`, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user, pin })
                });
                const result = await res.json();

                if (res.ok) {
                    if (remember) {
                        localStorage.setItem('xtc_remember_ip', ip);
                        localStorage.setItem('xtc_remember_port', port);
                    }
                    localStorage.setItem('xtc_session', JSON.stringify({ ip, port, user, pin, room: "", password: "" }));
                    document.body.style.opacity = '0';
                    setTimeout(() => window.location.href = '/chat', 300);
                } else {
                    notify(result.message || "Auth Failed", "❌");
                    btn.innerText = "CONNECT TO GATEWAY";
                    btn.disabled = false;
                }
            } catch (err) {
                notify("Gateway Offline", "📡");
                btn.innerText = "CONNECT TO GATEWAY";
                btn.disabled = false;
            }
        }

        document.addEventListener('keypress', (e) => { if (e.key === 'Enter') connect(); });
    </script>
</body>
</html>
