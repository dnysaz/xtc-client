<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>XtermChat · Chat</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="/_layout.js"></script>
<style>
  *{box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden;background:#f8fafc}
  .mono{font-family:'JetBrains Mono',monospace}

  /* ── Scrollbar ── */
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:4px}

  /* ── Sidebar ── */
  #sidebar{transform:translateX(-100%)}
  @media(min-width:1024px){#sidebar{transform:translateX(0)}}

  /* ── Bubbles ── */
  .bubble {
    display: inline-block;
    max-width: 100%;
    word-break: break-word;
    font-size: 14px;
    line-height: 1.6;
    padding: 10px 14px;
  }
  .bubble-me {
    background: #2563eb;
    color: #fff;
    border-radius: 18px 18px 4px 18px;
  }
  .bubble-them {
    background: #fff;
    color: #1e293b;
    border-radius: 18px 18px 18px 4px;
    border: 1px solid #e2e8f0;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
  }
  .bubble-bot {
    background: #f0fdf4;
    color: #14532d;
    border-radius: 18px 18px 18px 4px;
    border: 1px solid #bbf7d0;
    white-space: pre-wrap;
  }

  /* ── Links inside bubbles ── */
  .bubble-me   a.lnk { color: #bfdbfe; text-decoration: underline; }
  .bubble-them a.lnk { color: #2563eb; text-decoration: underline; }
  .bubble-bot  a.lnk { color: #16a34a; text-decoration: underline; }

  /* ── Link preview card ── */
  .link-preview {
    margin-top: 8px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(0,0,0,.08);
    background: #fff;
    max-width: 320px;
    text-decoration: none;
    display: block;
    transition: box-shadow .2s;
    cursor: pointer;
  }
  .link-preview:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); }
  .bubble-me .link-preview {
    border-color: rgba(255,255,255,.2);
    background: rgba(255,255,255,.12);
  }
  .bubble-me .link-preview .preview-text { color: rgba(255,255,255,.9); }
  .bubble-me .link-preview .preview-desc { color: rgba(255,255,255,.65); }
  .bubble-me .link-preview .preview-domain { color: rgba(255,255,255,.5); }

  .preview-img {
    width: 100%;
    height: 140px;
    object-fit: cover;
    display: block;
  }
  .preview-body { padding: 10px 12px; }
  .preview-text {
    font-size: 13px;
    font-weight: 600;
    color: #0f172a;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .preview-desc {
    font-size: 11.5px;
    color: #64748b;
    margin-top: 3px;
    line-height: 1.45;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .preview-domain {
    font-size: 10px;
    color: #94a3b8;
    margin-top: 5px;
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .preview-favicon {
    width: 12px;
    height: 12px;
    border-radius: 2px;
  }
  .preview-skeleton {
    background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 8px;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* ── Message input ── */
  #msgInput {
    width: 100%;
    background: #f8fafc;
    border: 1.5px solid #e2e8f0;
    border-radius: 14px;
    padding: 10px 48px 10px 15px;  /* kanan 48px biar tidak ketutup button */
    font-size: 14px;
    outline: none;
    resize: none;
    transition: all .2s;
    font-family: 'DM Sans', sans-serif;
    max-height: 120px;
    line-height: 1.5;
    display: block;  /* hapus flex:1 */
  }
  #msgInput:focus { border-color: #2563eb; background: #fff; box-shadow: 0 0 0 3px #2563eb18; }

  /* ── Room list ── */
  .room-item { cursor: pointer; transition: all .15s; border: 1px solid transparent; border-radius: 12px; }
  .room-item:hover  { background: #f1f5f9; }
  .room-item.active { background: #eff6ff; border-color: #bfdbfe; }

  /* ── Modal ── */
  .modal-bg { position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px); }
  .modal    { background:#fff;border-radius:18px;padding:24px;width:100%;max-width:340px; }

  /* ── Message animation ── */
  .msg-new { animation: fadeUp .22s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  /* ── Avatar colors ── */
  .av-0{background:#3b82f6}.av-1{background:#8b5cf6}.av-2{background:#ec4899}
  .av-3{background:#f59e0b}.av-4{background:#10b981}.av-5{background:#ef4444}
  .av-6{background:#06b6d4}.av-7{background:#84cc16}
</style>
</head>
<body>

<!-- Password Modal -->
<div id="passModal" class="modal-bg" style="display:none">
  <div class="modal">
    <div class="text-2xl mb-3">🔒</div>
    <h3 class="text-base font-bold text-slate-900 mb-1">Private Room</h3>
    <p class="text-sm text-slate-400 mb-4">Enter password to join</p>
    <input id="passInput" type="password" placeholder="Room password"
      class="w-full bg-slate-100 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-400 mb-4"
      onkeydown="if(event.key==='Enter')submitPass()">
    <div class="flex gap-3">
      <button onclick="closePass()" class="flex-1 py-2.5 rounded-xl bg-slate-100 text-slate-600 text-sm font-semibold">Cancel</button>
      <button onclick="submitPass()" class="flex-1 py-2.5 rounded-xl bg-blue-600 text-white text-sm font-semibold">Join</button>
    </div>
  </div>
</div>

<!-- Sidebar -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-60 bg-white border-r border-slate-100 z-40 flex flex-col transition-transform duration-300">
  <div class="flex items-center gap-3 px-5 py-5 border-b border-slate-100">
    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shrink-0"><span class="text-white font-black text-xs mono">xtc</span></div>
    <div class="flex-1"><div class="text-sm font-bold text-slate-900">XtermChat</div><div class="text-[10px] text-slate-400 mono">Admin Panel</div></div>
    <button onclick="closeSidebar()" class="lg:hidden text-slate-400 hover:text-slate-700 p-1 text-lg">✕</button>
  </div>
  <nav class="flex-1 px-3 py-4 space-y-1">
    <div class="px-1 mb-3 text-[9px] font-bold uppercase tracking-widest text-slate-300 mono">Navigation</div>
    <a href="/dashboard" class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-50 hover:text-slate-800 transition-colors"><span class="w-5 text-center">◈</span><span>Dashboard</span></a>
    <a href="/rooms"     class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-50 hover:text-slate-800 transition-colors"><span class="w-5 text-center">⊞</span><span>Rooms</span></a>
    <a href="/chat"      class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold bg-blue-50 text-blue-600"><span class="w-5 text-center">◎</span><span>Chat</span><span class="ml-auto w-1.5 h-1.5 rounded-full bg-blue-600"></span></a>
    <a href="/bots"      class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-50 hover:text-slate-800 transition-colors"><span class="w-5 text-center">⊕</span><span>Bots</span></a>
  </nav>
  <div class="px-4 py-4 border-t border-slate-100">
    <div class="flex items-center gap-3 mb-3">
      <div id="sb-avatar" class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold shrink-0">--</div>
      <div class="min-w-0">
        <div id="sb-user" class="text-sm font-bold text-slate-800 truncate">—</div>
        <div id="sb-ip"   class="text-[10px] text-slate-400 truncate mono">—</div>
      </div>
    </div>
    <button onclick="logout()" class="text-xs font-semibold text-slate-400 hover:text-red-500 transition-colors">← Disconnect</button>
  </div>
</aside>
<div id="overlay" onclick="closeSidebar()" style="display:none" class="fixed inset-0 bg-black/40 z-30 lg:hidden backdrop-blur-sm"></div>

<!-- ═══ CHAT LAYOUT ═══ -->
<div class="lg:pl-60 h-screen flex flex-col">

  <!-- Topbar -->
  <header class="shrink-0 bg-white border-b border-slate-100 px-4 h-14 flex items-center gap-3 z-20">
    <button onclick="openSidebar()" class="lg:hidden text-slate-400 hover:text-slate-700 p-1">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    <div id="roomHeader" class="flex-1">
      <span class="text-sm font-semibold text-slate-400">Select a room to start chatting</span>
    </div>
    <button onclick="toggleRoomPanel()" class="text-xs font-semibold text-blue-600 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg transition-colors mono">
      ⊞ Rooms
    </button>
  </header>

  <!-- Body -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Room list -->
    <div id="roomPanel" class="w-52 bg-white border-r border-slate-100 flex flex-col overflow-hidden shrink-0">
      <div class="px-4 py-3 border-b border-slate-100">
        <div class="text-[9px] font-bold uppercase tracking-widest text-slate-300 mono">Rooms</div>
      </div>
      <div id="roomItems" class="flex-1 overflow-y-auto py-2 px-2">
        <div class="text-xs text-slate-300 text-center py-8 mono">Loading...</div>
      </div>
    </div>

    <!-- Chat area -->
    <div class="flex-1 flex flex-col overflow-hidden bg-slate-50">

      <!-- Messages -->
      <div id="messages" class="flex-1 overflow-y-auto px-4 md:px-6 py-5">
        <div class="flex items-center justify-center h-full">
          <div class="text-center text-slate-300">
            <div class="text-4xl mb-3">◎</div>
            <div class="text-sm font-medium">Select a room to start chatting</div>
          </div>
        </div>
      </div>

      <!-- Input area -->
      <div id="inputArea" style="display:none" class="shrink-0 border-t border-slate-200 bg-white px-4 py-3">
        <div class="relative max-w-3xl mx-auto">
          <textarea id="msgInput" rows="2" placeholder="Type a message..."
            onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button onclick="sendMsg()"
            class="absolute right-2 bottom-2 w-10 h-10 mt-2 bg-blue-600 hover:bg-blue-700 active:scale-95 text-white rounded-full flex items-center justify-center transition-all shrink-0">
            <svg class="w-5 h-5 rotate-45" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const params     = new URLSearchParams(window.location.search);
let currentRoom  = params.get('room') || '';
let currentPass  = '';
let lastCount    = 0;
let pollInterval = null;
let pendingRoom  = null;

// OG cache: url → { title, desc, image, domain, favicon }
const ogCache = {};

(async () => {
  const s = requireSession();
  if (!s) return;
  await loadRoomList();
  if (currentRoom) await joinRoom(currentRoom, false);
})();

// ── Room list ─────────────────────────────────────────────────────────────────
async function loadRoomList() {
  const { data } = await GET('/rooms');
  const rooms    = data?.rooms || [];
  const el       = document.getElementById('roomItems');
  if (!el) return;

  if (!rooms.length) {
    el.innerHTML = '<div class="text-xs text-slate-400 text-center py-8 px-3">No rooms.<br>Create one first.</div>';
    return;
  }

  el.innerHTML = rooms.map(r => `
    <div onclick="joinRoom('${r.name}', ${r.has_password})"
      class="room-item flex items-center gap-2.5 px-3 py-2.5 mb-0.5 ${currentRoom === r.name ? 'active' : ''}">
      <div class="w-7 h-7 rounded-lg bg-blue-50 flex items-center justify-center text-blue-600 text-xs font-bold mono shrink-0">#</div>
      <div class="flex-1 min-w-0">
        <div class="text-xs font-semibold text-slate-800 truncate mono">@${r.name}</div>
        <div class="text-[10px] text-slate-400">${r.has_password ? '🔒 Private' : 'Open'}</div>
      </div>
    </div>`).join('');
}

// ── Join room ─────────────────────────────────────────────────────────────────
async function joinRoom(name, hasPassword, knownPass) {
  // Private room — show password modal (unless we already have the pass)
  if (hasPassword && !knownPass && name !== currentRoom) {
    pendingRoom = name;
    document.getElementById('passInput').value = '';
    document.getElementById('passModal').style.display = 'flex';
    setTimeout(() => document.getElementById('passInput').focus(), 100);
    return;
  }

  currentRoom = name;
  if (!hasPassword && !knownPass) currentPass = '';
  if (knownPass) currentPass = knownPass;
  lastCount   = 0;

  history.replaceState({}, '', `/chat?room=${encodeURIComponent(name)}`);

  // Update topbar
  document.getElementById('roomHeader').innerHTML = `
    <div class="flex items-center gap-2">
      <span class="w-6 h-6 rounded-md bg-blue-100 text-blue-600 flex items-center justify-center text-xs font-bold mono">#</span>
      <span class="text-sm font-bold text-slate-800">${name}</span>
    </div>`;

  document.getElementById('inputArea').style.display = 'block';

  // Highlight active room
  document.querySelectorAll('.room-item').forEach(el => {
    const active = el.textContent.includes(`@${name}`);
    el.classList.toggle('active', active);
  });

  // Hide room panel on mobile
  if (window.innerWidth < 768) {
    document.getElementById('roomPanel').classList.add('hidden');
  }

  if (pollInterval) clearInterval(pollInterval);
  await fetchMessages();
  pollInterval = setInterval(fetchMessages, 2000);
}

// ── Password modal ────────────────────────────────────────────────────────────
async function submitPass() {
  const pass = document.getElementById('passInput').value;
  const { ok } = await POST('/verify-room', { room: pendingRoom, password: pass });
  if (ok) {
    currentPass = pass;
    document.getElementById('passModal').style.display = 'none';
    joinRoom(pendingRoom, true, pass);  // pass knownPass so it won't be cleared
  } else {
    const inp = document.getElementById('passInput');
    inp.style.borderColor = '#f87171';
    inp.style.animation   = 'shake .3s';
    setTimeout(() => { inp.style.borderColor = ''; inp.style.animation = ''; }, 800);
  }
}
function closePass() {
  pendingRoom = null;
  document.getElementById('passModal').style.display = 'none';
}

// ── Fetch & render messages ───────────────────────────────────────────────────
async function fetchMessages() {
  if (!currentRoom) return;
  const s = requireSession();
  try {
    const path = `/messages/${encodeURIComponent(currentRoom)}${currentPass ? '?password=' + encodeURIComponent(currentPass) : ''}`;
    const { ok, data } = await GET(path);
    if (!ok || !Array.isArray(data)) return;
    if (data.length === lastCount) return;

    const el       = document.getElementById('messages');
    const atBottom = el.scrollHeight - el.scrollTop <= el.clientHeight + 100;
    const prevCount = lastCount;

    if (data.length === 0) {
      el.innerHTML = `
        <div class="flex items-center justify-center h-full">
          <div class="text-center text-slate-300">
            <div class="text-3xl mb-2">◎</div>
            <div class="text-sm">No messages yet. Say hello!</div>
          </div>
        </div>`;
      lastCount = 0;
      return;
    }

    // Group consecutive messages from same sender
    const groups = groupMessages(data);
    el.innerHTML  = groups.map((g, gi) => renderGroup(g, s.user, gi, prevCount, data)).join('');
    lastCount = data.length;

    if (atBottom) el.scrollTop = el.scrollHeight;

    // Fetch OG data for any new URLs
    el.querySelectorAll('[data-og-url]').forEach(placeholder => {
      const url = placeholder.getAttribute('data-og-url');
      fetchOG(url, placeholder);
    });

  } catch(e) {}
}

// ── Group messages by sender ──────────────────────────────────────────────────
function groupMessages(msgs) {
  const groups = [];
  let cur = null;
  msgs.forEach((m, i) => {
    const key = m.sender + (m.pin || '');
    if (!cur || cur.key !== key) {
      cur = { key, sender: m.sender, pin: m.pin, msgs: [], firstIdx: i };
      groups.push(cur);
    }
    cur.msgs.push({ ...m, idx: i });
  });
  return groups;
}

// ── Render a group of messages from same sender ───────────────────────────────
function renderGroup(group, me, groupIdx, prevCount, allMsgs) {
  const isMe  = group.sender.toLowerCase() === me.toLowerCase();
  const isBot = /BOT|MONITOR|WATCHDOG|DEPLOY|BACKUP/i.test(group.sender);
  const isNew = group.firstIdx >= prevCount;
  const cls   = isNew ? 'msg-new' : '';

  // Avatar color based on sender name hash
  const avColor = 'av-' + (group.sender.charCodeAt(0) % 8);
  const initials = group.sender.slice(0, 2).toUpperCase();

  const bubbles = group.msgs.map((m, mi) => {
    const ts   = (m.timestamp || '').slice(11, 16);
    const isFirst = mi === 0;
    const isLast  = mi === group.msgs.length - 1;

    // Linkify content
    const escaped = (m.content || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    // Detect URLs
    const urlRegex = /(https?:\/\/[^\s<>"]+)/g;
    const urls     = [...new Set(escaped.match(urlRegex) || [])];
    const linked   = escaped.replace(urlRegex, `<a href="$1" target="_blank" rel="noopener" class="lnk">$1</a>`);

    // Bubble radius tweaks for grouped messages
    let radius = '';
    if (isMe) {
      if (group.msgs.length === 1) radius = 'border-radius:18px 18px 4px 18px';
      else if (isFirst)            radius = 'border-radius:18px 18px 8px 18px';
      else if (isLast)             radius = 'border-radius:18px 18px 4px 18px';
      else                         radius = 'border-radius:18px 18px 8px 18px';
    } else {
      if (group.msgs.length === 1) radius = 'border-radius:18px 18px 18px 4px';
      else if (isFirst)            radius = 'border-radius:18px 18px 18px 8px';
      else if (isLast)             radius = 'border-radius:18px 18px 18px 4px';
      else                         radius = 'border-radius:18px 18px 18px 8px';
    }

    const bubbleClass = isBot ? 'bubble bubble-bot' : (isMe ? 'bubble bubble-me' : 'bubble bubble-them');

    // OG preview placeholders for each URL
    const previews = urls.map(url => `
      <div data-og-url="${url.replace(/"/g, '&quot;')}" class="og-placeholder">
        <div class="preview-skeleton" style="height:80px;margin-top:8px;border-radius:12px"></div>
      </div>`).join('');

    return `
      <div class="flex ${isMe ? 'justify-end' : ''} ${mi > 0 ? 'mt-1' : ''}">
        <div style="max-width:72%">
          <div class="${bubbleClass}" style="${radius}">${linked}</div>
          ${previews}
        </div>
      </div>
      ${isLast ? `<div class="text-[10px] text-slate-400 mt-1 ${isMe ? 'text-right' : 'pl-9'} mono">${ts}</div>` : ''}`;
  }).join('');

  if (isMe) {
    return `<div class="mb-3 ${cls}">${bubbles}</div>`;
  }

  if (isBot) {
    return `
      <div class="mb-3 ${cls}">
        <div class="flex items-center gap-2 mb-1.5 pl-1">
          <div class="w-6 h-6 rounded-full bg-green-100 flex items-center justify-center text-sm shrink-0">🤖</div>
          <span class="text-[11px] font-bold text-green-600 mono">${group.sender}</span>
        </div>
        ${bubbles}
      </div>`;
  }

  return `
    <div class="mb-3 ${cls}">
      <div class="flex items-center gap-2 mb-1.5 pl-1">
        <div class="w-6 h-6 rounded-full ${avColor} flex items-center justify-center text-white text-[10px] font-bold shrink-0">
          ${initials}
        </div>
        <span class="text-[11px] font-semibold text-slate-500 mono">${group.sender}</span>
      </div>
      ${bubbles}
    </div>`;
}

// ── OG preview fetcher ────────────────────────────────────────────────────────
async function fetchOG(url, placeholder) {
  if (!placeholder) return;

  // Check cache
  if (ogCache[url]) {
    renderPreview(placeholder, url, ogCache[url]);
    return;
  }

  // Use allorigins proxy to fetch OG tags (avoids CORS)
  const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;

  try {
    const res  = await fetch(proxyUrl, { signal: AbortSignal.timeout(6000) });
    const json = await res.json();
    const html = json?.contents || '';

    // Parse OG tags from raw HTML
    const getOG = (prop) => {
      const m = html.match(new RegExp(`<meta[^>]+(?:property|name)=["']${prop}["'][^>]+content=["']([^"']+)["']`, 'i'))
              || html.match(new RegExp(`<meta[^>]+content=["']([^"']+)["'][^>]+(?:property|name)=["']${prop}["']`, 'i'));
      return m ? m[1].replace(/&#(\d+);/g, (_, n) => String.fromCharCode(n)).trim() : '';
    };
    const getTitle = () => {
      const og = getOG('og:title');
      if (og) return og;
      const m = html.match(/<title[^>]*>([^<]+)<\/title>/i);
      return m ? m[1].trim() : '';
    };

    const domain  = new URL(url).hostname.replace(/^www\./, '');
    const favicon = `https://www.google.com/s2/favicons?domain=${domain}&sz=32`;
    const data    = {
      title:   getTitle().slice(0, 80),
      desc:    (getOG('og:description') || getOG('description')).slice(0, 140),
      image:   getOG('og:image') || '',
      domain,
      favicon,
    };

    ogCache[url] = data;
    renderPreview(placeholder, url, data);
  } catch(e) {
    // On failure — show minimal domain card
    try {
      const domain  = new URL(url).hostname.replace(/^www\./, '');
      const favicon = `https://www.google.com/s2/favicons?domain=${domain}&sz=32`;
      ogCache[url]  = { title: '', desc: '', image: '', domain, favicon };
      renderPreview(placeholder, url, ogCache[url]);
    } catch { placeholder.remove(); }
  }
}

function renderPreview(placeholder, url, d) {
  // If no useful data and no image, show minimal link card
  const hasContent = d.title || d.image;
  if (!hasContent) {
    placeholder.innerHTML = `
      <a href="${url}" target="_blank" rel="noopener" class="link-preview" style="padding:10px 12px;display:flex;align-items:center;gap:8px;text-decoration:none">
        <img src="${d.favicon}" class="preview-favicon" onerror="this.style.display='none'">
        <span class="preview-domain" style="margin:0;font-size:12px;color:#475569;font-weight:600">${d.domain}</span>
        <span style="color:#94a3b8;font-size:11px;margin-left:auto">↗</span>
      </a>`;
    return;
  }

  placeholder.innerHTML = `
    <a href="${url}" target="_blank" rel="noopener" class="link-preview" style="text-decoration:none">
      ${d.image ? `<img src="${d.image}" class="preview-img" onerror="this.style.display='none'" loading="lazy">` : ''}
      <div class="preview-body">
        ${d.title ? `<div class="preview-text">${d.title}</div>` : ''}
        ${d.desc  ? `<div class="preview-desc">${d.desc}</div>`  : ''}
        <div class="preview-domain">
          <img src="${d.favicon}" class="preview-favicon" onerror="this.style.display='none'">
          ${d.domain}
        </div>
      </div>
    </a>`;
}

// ── Send ──────────────────────────────────────────────────────────────────────
async function sendMsg() {
  const s   = requireSession();
  const inp = document.getElementById('msgInput');
  const msg = inp.value.trim();
  if (!msg || !currentRoom) return;
  inp.value            = '';
  inp.style.height     = 'auto';
  await POST('/send', {
    room: currentRoom, password: currentPass,
    user: s.user, pin: s.pin, content: msg,
  });
  await fetchMessages();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function toggleRoomPanel() {
  document.getElementById('roomPanel').classList.toggle('hidden');
}
</script>
